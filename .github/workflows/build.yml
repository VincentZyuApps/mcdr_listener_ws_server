name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  # ── Check Commit Message ──────────────────────────────
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"

          # Extract version from mcdreforged.plugin.json
          VERSION="v$(grep '"version"' mcdreforged.plugin.json | awk -F'"' '{print $4}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # Always build PRs
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "should_build=true"    >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Init flags
          BUILD=false
          RELEASE=false

          # Only build action and build release
          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          # Tag push: auto release
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            BUILD=true
            RELEASE=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"

          echo "📋 Flags: build=$BUILD release=$RELEASE"

  # ── Pack MCDR Plugin ──────────────────────────────────
  pack:
    name: Pack MCDR plugin
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pack plugin
        run: python -m mcdreforged pack

      - name: List artifacts
        run: ls -lh *.mcdr

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcdr-plugin
          path: '*.mcdr'
          if-no-files-found: error

  # ── Release to GitHub ─────────────────────────────────
  release:
    name: Release to GitHub
    needs: [check, pack]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: mcdr-plugin

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          ls -lh

      - name: Delete existing release & tag (force fresh)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "🗑️ Cleaning up existing release/tag: $VERSION"
          gh release delete "$VERSION" --yes --cleanup-tag 2>/dev/null || echo "No existing release to delete"
          sleep 3

      - name: Generate release notes from template
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${VERSION}$" | head -1)

          NOTES=$(cat .github/release_template.md)
          NOTES="${NOTES//__VERSION__/$VERSION}"
          NOTES="${NOTES//__REPO__/$REPO}"
          NOTES="${NOTES//__BASE_URL__/$BASE_URL}"
          NOTES="${NOTES//__BUILD_DATE__/$(date -u '+%Y-%m-%d %H:%M UTC')}"

          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${VERSION}"
          else
            CHANGELOG_URL="https://github.com/${REPO}/commits/${VERSION}"
          fi
          NOTES="${NOTES//__CHANGELOG_URL__/$CHANGELOG_URL}"

          COMMIT_HASH="[\`${GITHUB_SHA::7}\`](https://github.com/${REPO}/commit/${GITHUB_SHA})"
          NOTES="${NOTES//__COMMIT_HASH__/$COMMIT_HASH}"

          COMMIT_LOG=$(git log "${PREV_TAG:+${PREV_TAG}..}HEAD" --pretty=format:"- %s (\`%h\`)" --reverse)
          NOTES="${NOTES//__COMMIT_LOG__/$COMMIT_LOG}"

          echo "$NOTES" > release_notes.md
          echo "📝 Generated release notes:"
          cat release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          gh release create "$VERSION" \
            --title "mcdr_listener_ws_server ${VERSION}" \
            --notes-file release_notes.md \
            --latest \
            *.mcdr

  # ── Sync Release to Gitee ─────────────────────────────
  sync-gitee-release:
    name: 【Gitee码云】Sync Release
    needs: [check, release]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      GITEE_OWNER: vincent-zyu
      GITEE_REPO: mcdr_listener_ws_server
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get release info from GitHub
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.check.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          RELEASE_INFO=$(gh release view "$TAG" --json name,body,assets)
          echo "release_name=$(echo "$RELEASE_INFO" | jq -r '.name')" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_INFO" | jq -r '.body' > release_body.md

          echo "📦 Release: $TAG"

      - name: Download GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          mkdir -p assets
          cd assets
          gh release download "$TAG" --pattern "*"
          echo "📥 Downloaded files:"
          ls -la

      - name: Create or find Gitee Release
        id: gitee_release
        run: |
          TAG="${{ steps.release_info.outputs.tag }}"
          NAME="${{ steps.release_info.outputs.release_name }}"

          JSON_BODY=$(jq -R -s '.' < release_body.md)

          # Ensure tag exists on Gitee
          if curl -s --fail "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/tags/${TAG}?access_token=${GITEE_TOKEN}" > /dev/null 2>&1; then
            echo "🏷️ Tag $TAG already exists on Gitee"
          else
            echo "🏷️ Creating tag $TAG on Gitee..."
            curl -s -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/tags" \
              -d "{\"access_token\":\"${GITEE_TOKEN}\",\"tag_name\":\"${TAG}\",\"refs\":\"main\",\"tag_message\":\"Release ${TAG}\"}"
          fi

          # Check if release already exists
          EXISTING=$(curl -s "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")
          RELEASE_ID=$(echo "$EXISTING" | jq -r '.id')

          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "⚠️ Gitee release already exists (ID: $RELEASE_ID)"
          else
            echo "✅ No existing release, creating..."

            RELEASE_PAYLOAD=$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$TAG" \
              --arg name "$NAME" \
              --argjson body "$JSON_BODY" \
              '{
                access_token: $token,
                tag_name: $tag,
                name: $name,
                body: $body,
                target_commitish: "main",
                prerelease: false
              }')

            CREATE_RESPONSE=$(curl -s -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
              -d "$RELEASE_PAYLOAD")

            RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id')

            if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
              echo "❌ Failed to create Gitee release"
              echo "Response: $CREATE_RESPONSE"
              exit 1
            fi
            echo "✅ Created Gitee release (ID: $RELEASE_ID)"
          fi

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

      - name: Upload assets to Gitee
        if: steps.gitee_release.outputs.release_id != '' && steps.gitee_release.outputs.release_id != 'null'
        run: |
          RELEASE_ID="${{ steps.gitee_release.outputs.release_id }}"

          echo "📤 Uploading assets to Gitee release (ID: $RELEASE_ID)"

          for FILE in assets/*; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              echo "── Uploading $FILENAME ──"

              UPLOADED=false
              for ATTEMPT in 1 2 3; do
                RESPONSE=$(curl -s --max-time 300 \
                  -w "\n%{http_code}" \
                  -X POST --header "Content-Type: multipart/form-data" \
                  -F "access_token=${GITEE_TOKEN}" \
                  -F "file=@${FILE}" \
                  "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}/attach_files")

                HTTP_CODE=$(echo "$RESPONSE" | tail -1)
                BODY=$(echo "$RESPONSE" | sed '$d')

                if echo "$BODY" | jq -e '.browser_download_url' > /dev/null 2>&1; then
                  echo "✅ Uploaded: $FILENAME (HTTP $HTTP_CODE)"
                  UPLOADED=true
                  break
                fi
                echo "⚠️ Retry $ATTEMPT/3 — HTTP $HTTP_CODE"
                sleep 5
              done

              if [ "$UPLOADED" = false ]; then
                echo "❌ Failed: $FILENAME after 3 attempts"
              fi
            fi
          done

          echo "✅ Gitee release sync complete"
